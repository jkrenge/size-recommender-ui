<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Size Recommender Dev Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f3efe8;
        color: #10203c;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 40%),
          linear-gradient(180deg, #f7f1e7 0%, #eef2f8 100%);
      }

      main {
        margin: 0 auto;
        max-width: 900px;
        padding: 36px 20px 72px;
      }

      .shell {
        display: grid;
        gap: 24px;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        align-items: start;
      }

      .controls {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(16, 32, 60, 0.08);
        border-radius: 24px;
        padding: 22px;
      }

      .controls h2 {
        font-size: 1.1rem;
        margin: 0 0 16px;
      }

      .field-grid {
        display: grid;
        gap: 14px;
      }

      label {
        color: #41536f;
        display: grid;
        font-size: 0.92rem;
        font-weight: 600;
        gap: 8px;
      }

      input,
      select,
      button {
        border: 1px solid #d4dcea;
        border-radius: 14px;
        color: #10203c;
        font: inherit;
        min-height: 46px;
        padding: 0 14px;
      }

      button {
        background: #10203c;
        border-color: #10203c;
        color: white;
        cursor: pointer;
        font-weight: 700;
      }

      button.secondary {
        background: white;
        color: #10203c;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .hint {
        color: #607089;
        font-size: 0.9rem;
        line-height: 1.5;
        margin: 14px 0 0;
      }

      .widget-panel {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(16, 32, 60, 0.08);
        border-radius: 24px;
        max-width: 380px;
        padding: 24px;
      }

      .widget-panel h2 {
        font-size: 1rem;
        margin: 0 0 14px;
      }

      @media (max-width: 900px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <section class="controls">
          <h2>Widget Controls</h2>
          <div class="field-grid">
            <label>
              Article name
              <input
                id="article-name"
                name="articleName"
                value="Men's Iver Pants (tailored fit)"
              />
            </label>

            <label>
              Account ID
              <input
                id="account-id"
                name="accountId"
                inputmode="numeric"
                value="1619650"
              />
            </label>

            <label>
              404 mode
              <select id="not-found-mode" name="notFoundMode">
                <option value="true-to-size">Fallback to likely true to size</option>
                <option value="empty">Show no data available</option>
              </select>
            </label>

            <label>
              Appearance
              <select id="appearance" name="appearance">
                <option value="neutral">Neutral</option>
                <option value="colored">Colored</option>
              </select>
            </label>

            <label>
              Density
              <select id="density" name="density">
                <option value="compact">Compact</option>
                <option value="comfortable">Comfortable</option>
              </select>
            </label>

            <label>
              Surface
              <select id="surface" name="surface">
                <option value="subtle">Subtle card</option>
                <option value="plain">Plain inline</option>
              </select>
            </label>
          </div>

          <div class="button-row">
            <button id="render-widget" type="button">Render widget</button>
            <button id="simulate-missing" class="secondary" type="button">
              Simulate 404 article
            </button>
          </div>

          <p class="hint">
            Default values match your sample API call. Edit the article and re-render
            to test other products or the configurable 404 behavior.
          </p>
        </section>

        <section class="widget-panel">
          <h2>Embedded widget</h2>
          <div id="size-recommender-demo"></div>
        </section>
      </div>
    </main>

    <script src="./dist/size-recommender.iife.js"></script>
    <script src="./dev/main.js"></script>
  </body>
</html>
